name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows
          - arch: ARM64
            triplet: arm64-windows

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout (with vcpkg submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat
        shell: cmd

      - name: Configure
        run: >
          cmake -B build -S .
          -G "Visual Studio 17 2022" -A ${{ matrix.arch }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build Release
        run: cmake --build build --config Release

      - name: Build Debug
        run: cmake --build build --config Debug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watcher-${{ matrix.arch }}
          path: |
            build/Release/watcher.dll
            build/Release/watcher.lib
            build/Release/watcher.pdb
            build/Debug/watcher.dll
            build/Debug/watcher.lib
            build/Debug/watcher.pdb
          if-no-files-found: error

      - name: Package release binaries
        if: startsWith(github.ref, 'refs/tags/')
        run: >
          Compress-Archive
          -Path build/Release/watcher.dll, build/Release/watcher.lib
          -DestinationPath watcher-${{ matrix.arch }}.zip
        shell: pwsh

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: watcher-${{ matrix.arch }}.zip
