name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows
          - arch: ARM64
            triplet: arm64-windows

    env:
      # x-gha was removed from vcpkg; use the "files" provider cached via actions/cache.
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"

    steps:
      - name: Checkout (with vcpkg submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.triplet }}-

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat
        shell: cmd

      - name: Configure
        # No -G: let CMake auto-select the Visual Studio version installed on the
        # runner (hosted images no longer ship VS 2022). -A still selects the target arch.
        run: >
          cmake -B build -S .
          -A ${{ matrix.arch }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      - name: Build Release
        run: cmake --build build --config Release

      - name: Build Debug
        run: cmake --build build --config Debug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: watcher-${{ matrix.arch }}
          path: |
            src/watcher.h
            build/Release/watcher.dll
            build/Release/watcher.lib
            build/Release/watcher.pdb
            build/Debug/watcher.dll
            build/Debug/watcher.lib
            build/Debug/watcher.pdb
          if-no-files-found: error

      - name: Package release binaries
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $stage = "pkg/watcher-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path "$stage/release", "$stage/debug" | Out-Null
          Copy-Item build/Release/watcher.dll, build/Release/watcher.lib -Destination "$stage/release/"
          Copy-Item build/Debug/watcher.dll, build/Debug/watcher.lib, build/Debug/watcher.pdb -Destination "$stage/debug/"
          Copy-Item src/watcher.h -Destination "$stage/"
          Compress-Archive -Path "$stage/*" -DestinationPath "watcher-${{ matrix.arch }}.zip"

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: watcher-${{ matrix.arch }}.zip
